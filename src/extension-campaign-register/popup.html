<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>万相台推广登记</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="popup">
      <div class="popup-left">
        <section class="popup-section popup-section--open-links">
          <button type="button" id="open-onesite-record" class="popup-open-sites">货品全站推广</button>
          <button type="button" id="open-search-record" class="popup-open-sites">关键词推广</button>
          <button type="button" id="open-promo-record" class="popup-open-sites">人群推广</button>
          <button type="button" id="open-content-record" class="popup-open-sites">内容营销</button>
        </section>
        <section class="popup-section popup-section--findpage" id="findpage-section">
          <header class="popup-findpage-header">
            <h2 class="popup-findpage-title">推广列表</h2>
            <button type="button" id="findpage-action" class="popup-findpage-refresh">登记</button>
            <button type="button" id="findpage-refresh" class="popup-findpage-refresh" aria-label="刷新列表">
              刷新列表
            </button>
          </header>
          <div id="findpage-list" class="popup-findpage-list" role="list"></div>
        </section>
      </div>
      <section class="popup-section popup-section--logs">
        <header class="popup-logs-header">
          <h2 class="popup-logs-title">日志</h2>
          <button type="button" id="logs-clear" class="popup-logs-clear" aria-label="清空日志">清空</button>
        </header>
        <div id="logs-list" class="popup-logs-list" role="log" aria-live="polite"></div>
      </section>
    </div>
    <script src="constants/defaults.js"></script>
    <script src="constants/supabase.js"></script>
    <script src="utils/logger.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
