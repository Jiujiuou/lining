<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>店铺记录数据</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="popup">
      <div class="popup-left">
        <section
          class="popup-section popup-section--controls"
          aria-label="控制区"
        >
          <div class="popup-controls-page-row">
            <button type="button" id="shop-rate-open" class="popup-open-sites">
              店铺分
            </button>
            <button type="button" id="alimama-open" class="popup-open-sites">
              淘宝联盟
            </button>
            <button type="button" id="onebp-open" class="popup-open-sites">
              万象台1
            </button>
            <button
              type="button"
              id="onebp-display-open"
              class="popup-open-sites"
            >
              万象台2
            </button>
            <button type="button" id="onebp-site-open" class="popup-open-sites">
              万象3
            </button>
            <button
              type="button"
              id="onebp-shortvideo-open"
              class="popup-open-sites"
            >
              万象4
            </button>
            <button
              type="button"
              id="sycm-my-space-open"
              class="popup-open-sites"
            >
              千牛后台
            </button>
            <button
              type="button"
              id="report-submit-open"
              class="popup-open-sites"
            >
              上报页
            </button>
          </div>
          <div class="popup-controls-action-row">
            <button
              type="button"
              id="open-all-pages"
              class="popup-open-sites popup-open-all"
            >
              一键打开所有页面
            </button>
            <button
              type="button"
              id="report-submit-fill"
              class="popup-open-sites popup-open-sites--fill"
              title="将本地合并数据填入联核 OA 上报页（需已打开或自动打开上报页）"
            >
              自动填充数据
            </button>
            <div id="metrics-date" class="popup-metrics-inline-date">--</div>
            <button
              type="button"
              id="daily-local-clear"
              class="popup-open-sites popup-open-sites--clear"
              title="清除合并后的每日指标快照（不影响云端）"
            >
              清空本地数据
            </button>
          </div>
        </section>
        <section
          class="popup-section popup-section--findpage popup-section--findpage-tight"
          id="shop-record-findpage-section"
        >
          <div
            id="shop-record-body"
            class="popup-findpage-list popup-findpage-list--metrics"
            role="region"
            aria-label="主内容区"
          ></div>
        </section>
      </div>
      <section class="popup-section popup-section--logs">
        <header class="popup-logs-header">
          <h2 class="popup-logs-title">日志</h2>
          <button
            type="button"
            id="logs-clear"
            class="popup-logs-clear"
            aria-label="清空日志"
          >
            清空
          </button>
        </header>
        <div
          id="logs-list"
          class="popup-logs-list"
          role="log"
          aria-live="polite"
        ></div>
      </section>
    </div>
    <script src="constants/defaults.js"></script>
    <script src="utils/logger.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
