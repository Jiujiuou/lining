<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>生意参谋详情数据</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="popup">
      <div class="popup-left">
        <section class="popup-section popup-section--goods">
          <header class="popup-findpage-header popup-goods-actions">
            <button
              type="button"
              id="goods-refresh"
              class="popup-findpage-refresh"
            >
              刷新列表
            </button>
            <button
              type="button"
              id="goods-select-all"
              class="popup-findpage-refresh"
            >
              全选
            </button>
            <button
              type="button"
              id="goods-select-none"
              class="popup-findpage-refresh"
            >
              全不选
            </button>
            <button type="button" id="goods-save" class="popup-open-sites">
              保存设置
            </button>
          </header>
          <p id="goods-meta" class="popup-goods-meta" aria-live="polite"></p>
          <div class="popup-poll-controls" role="group" aria-label="详情指标轮询">
            <div class="popup-poll-row">
              <label class="popup-poll-label" for="poll-interval-value">轮询间隔</label>
              <div class="popup-poll-interval">
                <input
                  id="poll-interval-value"
                  class="popup-poll-input"
                  type="number"
                  min="1"
                  max="999"
                  step="1"
                  value="5"
                  inputmode="numeric"
                />
                <select id="poll-interval-unit" class="popup-poll-select" aria-label="轮询间隔单位">
                  <option value="sec">秒</option>
                  <option value="min" selected>分</option>
                  <option value="hour">时</option>
                </select>
              </div>
            </div>
            <div class="popup-poll-row">
              <label class="popup-poll-label">并发</label>
              <div class="popup-poll-readonly" aria-label="并发固定为 1">1（固定）</div>
            </div>
            <div class="popup-poll-actions">
              <button type="button" id="poll-start" class="popup-open-sites">开始采集详情</button>
              <button type="button" id="poll-stop" class="popup-findpage-refresh">停止</button>
            </div>
            <p id="poll-meta" class="popup-goods-meta" aria-live="polite"></p>
          </div>
          <div id="goods-list" class="popup-findpage-list" role="list"></div>
        </section>
      </div>
      <section class="popup-section popup-section--logs">
        <header class="popup-logs-header">
          <h2 class="popup-logs-title">扩展日志</h2>
          <button
            type="button"
            id="logs-export"
            class="popup-logs-clear"
            aria-label="复制扩展日志到剪贴板"
          >
            复制
          </button>
          <button
            type="button"
            id="logs-clear"
            class="popup-logs-clear"
            aria-label="清空扩展日志"
          >
            清空
          </button>
        </header>
        <div
          id="logs-list"
          class="popup-logs-list"
          role="log"
          aria-live="polite"
        ></div>
      </section>
    </div>
    <script src="constants/defaults.js"></script>
    <script src="utils/common.js"></script>
    <script src="utils/logger.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
